name: Deploy Application

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment (dev|prod)'
      release_name:
        required: false
        type: string
        default: 'nod-web'
      namespace:
        required: false
        type: string
        default: 'nod-web'
      values_file:
        required: false
        type: string
        default: 'values.dev.yaml'
      dry_run:
        required: false
        type: boolean
        default: false
      skip_build:
        required: false
        type: boolean
        default: true
      force:
        required: false
        type: boolean
        default: false
      image_repository:
        required: false
        type: string
      image_tag:
        required: false
        type: string
      helm_extra_args:
        required: false
        type: string
        default: ''
    secrets:
      GH_USERNAME:
        required: true
      GH_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Validate environment
        run: |
          if [[ "${{ inputs.environment }}" != "dev" && "${{ inputs.environment }}" != "prod" ]]; then
            echo "❌ Invalid environment: ${{ inputs.environment }}. Use 'dev' or 'prod'."
            exit 1
          fi
          echo "✅ Environment validated: ${{ inputs.environment }}"

      - name: Set values file based on environment
        run: |
          VALUES_FILE="${{ inputs.values_file }}"
          if [[ "$VALUES_FILE" == "values.dev.yaml" && "${{ inputs.environment }}" == "prod" ]]; then
            VALUES_FILE="values.prod.yaml"
          fi
          echo "VALUES_FILE=$VALUES_FILE" >> $GITHUB_ENV
          echo "📁 Using values file: $VALUES_FILE"

      - name: Check cluster connection
        run: |
          echo "🔍 Checking cluster connection..."
          echo "💡 Current KUBECONFIG: ${KUBECONFIG:-'not set'}"
          
          # Check if kubeconfig file exists
          if [ ! -z "$KUBECONFIG" ] && [ ! -f "$KUBECONFIG" ]; then
            echo "❌ KUBECONFIG file not found: $KUBECONFIG"
            exit 1
          fi
          
          # Check current context
          CURRENT_CONTEXT=$(kubectl config current-context 2>/dev/null)
          if [ -z "$CURRENT_CONTEXT" ]; then
            echo "❌ No current context found"
            echo "💡 Available contexts:"
            kubectl config get-contexts 2>/dev/null || echo "No contexts available"
            exit 1
          fi
          
          echo "✅ Current context: $CURRENT_CONTEXT"
          
          # Check cluster connection
          if ! kubectl cluster-info &> /dev/null; then
            echo "❌ Cannot connect to cluster"
            echo "💡 Context: $CURRENT_CONTEXT"
            echo "💡 KUBECONFIG: $KUBECONFIG"
            exit 1
          fi
          
          echo "✅ Connected to cluster successfully"
          kubectl cluster-info

      - name: Check namespace and cleanup if needed
        if: inputs.force == 'true'
        run: |
          echo "📁 Checking namespace..."
          if kubectl get namespace ${{ inputs.namespace }} &> /dev/null; then
            echo "📁 Namespace ${{ inputs.namespace }} already exists"
            echo "💡 Force flag enabled, cleaning up existing namespace..."
            
            # Clean up resources in the namespace
            echo "🧹 Cleaning up resources in namespace..."
            kubectl delete all --all -n ${{ inputs.namespace }} --ignore-not-found=true
            kubectl delete pvc --all -n ${{ inputs.namespace }} --ignore-not-found=true
            kubectl delete pv --all -n ${{ inputs.namespace }} --ignore-not-found=true
            kubectl delete configmap --all -n ${{ inputs.namespace }} --ignore-not-found=true
            kubectl delete secret --all -n ${{ inputs.namespace }} --ignore-not-found=true --field-selector=metadata.labels.app.kubernetes.io/managed-by!=external
            kubectl delete serviceaccount --all -n ${{ inputs.namespace }} --ignore-not-found=true
            
            echo "✅ Namespace resources cleaned up"
          else
            echo "📁 Namespace ${{ inputs.namespace }} will be created by Helm"
          fi

      - name: Deploy with Helm
        run: |
          echo "🚀 Starting deployment..."
          echo "📋 Configuration:"
          echo "  Environment: ${{ inputs.environment }}"
          echo "  Release: ${{ inputs.release_name }}"
          echo "  Namespace: ${{ inputs.namespace }}"
          echo "  Values file: ${{ env.VALUES_FILE }}"
          echo "  Dry run: ${{ inputs.dry_run }}"
          echo "  Skip build: ${{ inputs.skip_build }}"
          echo "  Force: ${{ inputs.force }}"
          if [ ! -z "${{ inputs.helm_extra_args }}" ]; then
            echo "  Extra Helm args: ${{ inputs.helm_extra_args }}"
          fi
          
          # Build Helm command
          HELM_ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            HELM_ARGS="--dry-run"
            echo "🔍 Running in dry-run mode"
          fi
          
          # Set image parameters
          IMAGE_REPO="${{ inputs.image_repository }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          
          # Build Helm command
          HELM_CMD="helm upgrade --install ${{ inputs.release_name }} ./nod-web \
              --namespace ${{ inputs.namespace }} \
              --values ${{ env.VALUES_FILE }} \
              --create-namespace \
              --wait \
              --timeout 10m \
              $HELM_ARGS"
          
          # Add image parameters only if explicitly provided
          if [ ! -z "$IMAGE_REPO" ] && [[ ! "${{ inputs.helm_extra_args }}" =~ image\.repository ]]; then
            echo "📦 Using image repository from input: $IMAGE_REPO"
            HELM_CMD="$HELM_CMD --set image.repository=$IMAGE_REPO"
          else
            echo "📦 Using image repository from values file"
          fi
          
          if [ ! -z "$IMAGE_TAG" ] && [[ ! "${{ inputs.helm_extra_args }}" =~ image\.tag ]]; then
            echo "📦 Using image tag from input: $IMAGE_TAG"
            HELM_CMD="$HELM_CMD --set image.tag=$IMAGE_TAG"
          else
            echo "📦 Using image tag from values file"
          fi
          
          # Add extra Helm arguments if provided
          if [ ! -z "${{ inputs.helm_extra_args }}" ]; then
            echo "📋 Adding extra Helm args: ${{ inputs.helm_extra_args }}"
            HELM_CMD="$HELM_CMD ${{ inputs.helm_extra_args }}"
          fi
          
          echo "🔧 Final Helm command:"
          echo "$HELM_CMD"
          
          # Validate chart before deployment
          echo "🔍 Validating chart..."
          helm lint ./nod-web || {
            echo "❌ Chart validation failed"
            exit 1
          }
          
          echo "Executing: $HELM_CMD"
          
          # Show namespace status before deployment
          echo "📁 Checking namespace status before deployment..."
          kubectl get namespace ${{ inputs.namespace }} --ignore-not-found=true || echo "Namespace does not exist yet"
          
          # Execute Helm command
          echo "🔧 Executing Helm command..."
          eval $HELM_CMD
          HELM_EXIT_CODE=$?
          
          # If Helm fails, show more debugging info
          if [ $HELM_EXIT_CODE -ne 0 ]; then
            echo "🔍 Helm deployment failed. Checking for issues..."
            echo "📋 Checking namespace resources:"
            kubectl get all -n ${{ inputs.namespace }} || echo "No resources found"
            echo "📋 Checking events:"
            kubectl get events -n ${{ inputs.namespace }} --sort-by='.lastTimestamp' || echo "No events found"
            echo "📋 Checking pod logs:"
            kubectl logs -n ${{ inputs.namespace }} -l app.kubernetes.io/name=nod-web --tail=50 || echo "No logs found"
            echo "📋 Checking pod status:"
            kubectl get pods -n ${{ inputs.namespace }} -o wide || echo "No pods found"
            echo "📋 Checking deployment status:"
            kubectl describe deployment -n ${{ inputs.namespace }} $(kubectl get deployment -n ${{ inputs.namespace }} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || echo "No deployment found"
            exit 1
          fi
          
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "✅ Dry run completed successfully!"
          else
            echo "✅ Deployment successful!"
            echo "📊 Check status with:"
            echo "  kubectl get pods -n ${{ inputs.namespace }}"
            echo "  kubectl get svc -n ${{ inputs.namespace }}"
            echo "  helm list -n ${{ inputs.namespace }}"
            
            # Show service URL if available
            SERVICE_URL=$(kubectl get svc -n ${{ inputs.namespace }} -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ ! -z "$SERVICE_URL" ]; then
              echo "🌐 Service URL: http://$SERVICE_URL"
            fi
            
            # Show deployment info
            echo "📋 Deployment Info:"
            echo "  Image: $IMAGE_REPO:$IMAGE_TAG"
            echo "  Environment: ${{ inputs.environment }}"
            echo "  Namespace: ${{ inputs.namespace }}"
            echo "  Release: ${{ inputs.release_name }}"
          fi 