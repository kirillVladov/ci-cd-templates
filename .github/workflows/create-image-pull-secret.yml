name: Create Image Pull Secret

on:
  workflow_call:
    inputs:
      namespace:
        required: false
        type: string
        default: 'nod-web'
    secrets:
      GH_USERNAME:
        required: true
      GH_TOKEN:
        required: true

jobs:
  create-pull-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Create image pull secret
        run: |
          echo "🔐 Setting up GitHub Container Registry image pull secret..."
          
          # Check if required environment variables are set
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
              echo "❌ GH_TOKEN secret is not set"
              exit 1
          fi
          
          if [ -z "${{ secrets.GH_USERNAME }}" ]; then
              echo "❌ GH_USERNAME secret is not set"
              exit 1
          fi
          
          NAMESPACE="${{ inputs.namespace }}"
          echo "📦 Creating image pull secret in namespace: $NAMESPACE"
          
          # Create the secret with proper labels to prevent Helm from deleting it
          kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ secrets.GH_USERNAME }} \
              --docker-password=${{ secrets.GH_TOKEN }} \
              --docker-email=kirillovvlad8@gmail.com \
              --namespace=$NAMESPACE \
              --dry-run=client -o yaml | \
          kubectl apply -f -
          
          # Add labels to prevent Helm from managing this secret
          echo "🏷️  Adding labels to prevent Helm from deleting the secret..."
          kubectl label secret ghcr-secret -n $NAMESPACE \
              "app.kubernetes.io/managed-by=external" \
              "helm.sh/resource-policy=keep" \
              --overwrite
          
          echo "✅ Image pull secret created successfully!"
          echo "Secret details:"
          kubectl get secret ghcr-secret -n $NAMESPACE -o yaml | grep -E "(name:|type:|labels:)" || echo "Secret not found"
          
          echo "📋 Next steps:"
          echo "1. The secret is now protected from Helm deletion"
          echo "2. You can now deploy your application"
          echo "3. The secret will persist across Helm deployments" 