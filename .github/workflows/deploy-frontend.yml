name: Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      NAMESPACE: 
        required: true
        type: string
      REGISTRY:
        required: true
        type: string
      IMAGE_NAME:
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: true
      GH_USERNAME:
        required: true
      KUBE_CONFIG_DEV:
        required: true
      KUBE_CONFIG_PROD:
        required: true


env:
  REGISTRY: ${{ inputs.REGISTRY }}
  IMAGE_NAME: ${{ inputs.IMAGE_NAME }}  
  NAMESPACE: ${{ inputs.NAMESPACE }}

jobs:
#  test:
#    runs-on: ubuntu-latest
#    steps:
#    - name: Checkout code
#      uses: actions/checkout@v4
#
#    - name: Setup Node.js
#      uses: actions/setup-node@v4
#      with:
#        node-version: '18'
#        cache: 'npm'
#
#    - name: Install dependencies
#      run: npm ci
#
#    - name: Run tests
#      run: npm run test || echo "No tests configured"
#
#    - name: Run linting
#      run: npm run lint

  build:
#    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.event.inputs.environment == 'dev'
    environment: development
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        if [ -z "${{ secrets.KUBE_CONFIG_DEV }}" ]; then
          echo "❌ KUBE_CONFIG_DEV secret is not set"
          echo "Please add KUBE_CONFIG_DEV secret to your repository"
          echo "Settings → Secrets and variables → Actions"
          exit 1
        fi
        
        echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > kubeconfig
        chmod 600 kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
        
        echo "Kubeconfig file size: $(wc -c < kubeconfig) bytes"
        if [ $(wc -c < kubeconfig) -lt 100 ]; then
          echo "❌ Kubeconfig file is too small, check your secret"
          exit 1
        fi
        
        echo "Kubeconfig first 200 chars:"
        head -c 200 kubeconfig
        echo ""
        echo "Checking kubectl config:"
        kubectl config view --minify || echo "Failed to view config"

    - name: Clean up existing namespace (if needed)
      run: |
        echo "🧹 Checking for existing namespace..."
        if kubectl get namespace nod-web &> /dev/null; then
          echo "📁 Found existing namespace, cleaning up resources..."
          kubectl delete all --all -n nod-web --ignore-not-found=true
          kubectl delete pvc --all -n nod-web --ignore-not-found=true
          kubectl delete configmap --all -n nod-web --ignore-not-found=true
          kubectl delete secret --all -n nod-web --ignore-not-found=true
          kubectl delete serviceaccount --all -n nod-web --ignore-not-found=true
          echo "✅ Namespace resources cleaned up"
        else
          echo "✅ No existing namespace found"
        fi

    - name: Create image pull secret
      env:
        GH_USERNAME: ${{ secrets.GH_USERNAME }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "🔐 Setting up GitHub Container Registry image pull secret..."

        if [ -z "$GH_TOKEN" ]; then
          echo "❌ GH_TOKEN secret is not set"
          exit 1
        fi
        if [ -z "$GH_USERNAME" ]; then
          echo "❌ GH_USERNAME secret is not set"
          exit 1
        fi

        kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=$GH_USERNAME \
          --docker-password=$GH_TOKEN \
          --docker-email=kirillovvlad8@gmail.com \
          --namespace=${{ env.NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl label secret ghcr-secret -n ${{ env.NAMESPACE }} \
          "app.kubernetes.io/managed-by=external" \
          "helm.sh/resource-policy=keep" \
          --overwrite

        echo "✅ Image pull secret created successfully!"
        kubectl get secret ghcr-secret -n ${{ env.NAMESPACE }} -o yaml | grep -E "(name:|type:|labels:)" || echo "Secret not found"
    - name: Set short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
    - name: Deploy to development
      run: |
        echo "🚀 Starting deployment..."
        echo "📋 Configuration:"
        echo "  Environment: dev"
        echo "  Release: nod-web"
        echo "  Namespace: nod-web"
        echo "  Image tag: dev-$SHORT_SHA"
        
        # Validate environment
        if [[ "dev" != "dev" && "dev" != "prod" ]]; then
          echo "❌ Invalid environment: dev. Use 'dev' or 'prod'."
          exit 1
        fi
        echo "✅ Environment validated: dev"
        
        # Set values file based on environment
        VALUES_FILE="values.dev.yaml"
        if [[ "$VALUES_FILE" == "values.dev.yaml" && "dev" == "prod" ]]; then
          VALUES_FILE="values.prod.yaml"
        fi
        echo "📁 Using values file: $VALUES_FILE"
        
        # Check cluster connection
        echo "🔍 Checking cluster connection..."
        CURRENT_CONTEXT=$(kubectl config current-context 2>/dev/null)
        if [ -z "$CURRENT_CONTEXT" ]; then
          echo "❌ No current context found"
          kubectl config get-contexts 2>/dev/null || echo "No contexts available"
          exit 1
        fi
        echo "✅ Current context: $CURRENT_CONTEXT"
        
        if ! kubectl cluster-info &> /dev/null; then
          echo "❌ Cannot connect to cluster"
          exit 1
        fi
        echo "✅ Connected to cluster successfully"
        
        # Build Helm command
        HELM_CMD="helm upgrade --install nod-web ./nod-web \
            --namespace ${{ env.NAMESPACE }} \
            --values $VALUES_FILE \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.tag=dev-$SHORT_SHA"
        
        echo "🔧 Final Helm command:"
        echo "$HELM_CMD"
        
        # Validate chart before deployment
        echo "🔍 Validating chart..."
        helm lint ./nod-web || {
          echo "❌ Chart validation failed"
          exit 1
        }
        
        echo "Executing: $HELM_CMD"
        
        # Show namespace status before deployment
        echo "📁 Checking namespace status before deployment..."
        kubectl get namespace nod-web --ignore-not-found=true || echo "Namespace does not exist yet"
        
        # Execute Helm command
        echo "🔧 Executing Helm command..."
        eval $HELM_CMD
        HELM_EXIT_CODE=$?
        
        # If Helm fails, show more debugging info
        if [ $HELM_EXIT_CODE -ne 0 ]; then
          echo "🔍 Helm deployment failed. Checking for issues..."
          echo "📋 Checking namespace resources:"
          kubectl get all -n nod-web || echo "No resources found"
          echo "📋 Checking events:"
          kubectl get events -n nod-web --sort-by='.lastTimestamp' || echo "No events found"
          echo "📋 Checking pod logs:"
          kubectl logs -n nod-web -l app.kubernetes.io/name=nod-web --tail=50 || echo "No logs found"
          echo "📋 Checking pod status:"
          kubectl get pods -n nod-web -o wide || echo "No pods found"
          echo "📋 Checking deployment status:"
          kubectl describe deployment -n nod-web $(kubectl get deployment -n nod-web -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || echo "No deployment found"
          exit 1
        fi
        
        echo "✅ Deployment successful!"
        echo "📊 Check status with:"
        echo "  kubectl get pods -n nod-web"
        echo "  kubectl get svc -n nod-web"
        echo "  helm list -n nod-web"
        
        # Show service URL if available
        SERVICE_URL=$(kubectl get svc -n nod-web -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null)
        if [ ! -z "$SERVICE_URL" ]; then
          echo "🌐 Service URL: http://$SERVICE_URL"
        fi
        
        # Show deployment info
        echo "📋 Deployment Info:"
        echo "  Image tag: dev-$SHORT_SHA"
        echo "  Environment: dev"
        echo "  Namespace: nod-web"
        echo "  Release: nod-web"

    - name: Verify deployment
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/nod-web -n nod-web

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event.inputs.environment == 'prod'
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        if [ -z "${{ secrets.KUBE_CONFIG_PROD }}" ]; then
          echo "❌ KUBE_CONFIG_PROD secret is not set"
          echo "Please add KUBE_CONFIG_PROD secret to your repository"
          echo "Settings → Secrets and variables → Actions"
          exit 1
        fi
        
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
        chmod 600 kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
        
        echo "Kubeconfig file size: $(wc -c < kubeconfig) bytes"
        if [ $(wc -c < kubeconfig) -lt 100 ]; then
          echo "❌ Kubeconfig file is too small, check your secret"
          exit 1
        fi
        
        echo "Kubeconfig first 200 chars:"
        head -c 200 kubeconfig
        echo ""
        echo "Checking kubectl config:"
        kubectl config view --minify || echo "Failed to view config"

    - name: Clean up existing namespace (if needed)
      run: |
        echo "🧹 Checking for existing namespace..."
        if kubectl get namespace nod-web-prod &> /dev/null; then
          echo "📁 Found existing namespace, cleaning up resources..."
          kubectl delete all --all -n nod-web-prod --ignore-not-found=true
          kubectl delete pvc --all -n nod-web-prod --ignore-not-found=true
          kubectl delete configmap --all -n nod-web-prod --ignore-not-found=true
          kubectl delete secret --all -n nod-web-prod --ignore-not-found=true
          kubectl delete serviceaccount --all -n nod-web-prod --ignore-not-found=true
          echo "✅ Namespace resources cleaned up"
        else
          echo "✅ No existing namespace found"
        fi
    - name: Create image pull secret
      env:
        GH_USERNAME: ${{ secrets.GH_USERNAME }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "🔐 Setting up GitHub Container Registry image pull secret..."

        if [ -z "$GH_TOKEN" ]; then
          echo "❌ GH_TOKEN secret is not set"
          exit 1
        fi
        if [ -z "$GH_USERNAME" ]; then
          echo "❌ GH_USERNAME secret is not set"
          exit 1
        fi

        kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=$GH_USERNAME \
          --docker-password=$GH_TOKEN \
          --docker-email=kirillovvlad8@gmail.com \
          --namespace=${{ env.NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl label secret ghcr-secret -n ${{ env.NAMESPACE }} \
          "app.kubernetes.io/managed-by=external" \
          "helm.sh/resource-policy=keep" \
          --overwrite

        echo "✅ Image pull secret created successfully!"
        kubectl get secret ghcr-secret -n ${{ env.NAMESPACE }} -o yaml | grep -E "(name:|type:|labels:)" || echo "Secret not found"
    - name: Set short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
    - name: Deploy to production
      run: |
        echo "🚀 Starting deployment..."
        echo "📋 Configuration:"
        echo "  Environment: prod"
        echo "  Release: nod-web-prod"
        echo "  Namespace: nod-web-prod"
        echo "  Image tag: $SHORT_SHA"
        
        # Validate environment
        if [[ "prod" != "dev" && "prod" != "prod" ]]; then
          echo "❌ Invalid environment: prod. Use 'dev' or 'prod'."
          exit 1
        fi
        echo "✅ Environment validated: prod"
        
        # Set values file based on environment
        VALUES_FILE="values.dev.yaml"
        if [[ "$VALUES_FILE" == "values.dev.yaml" && "prod" == "prod" ]]; then
          VALUES_FILE="values.prod.yaml"
        fi
        echo "📁 Using values file: $VALUES_FILE"
        
        # Check cluster connection
        echo "🔍 Checking cluster connection..."
        CURRENT_CONTEXT=$(kubectl config current-context 2>/dev/null)
        if [ -z "$CURRENT_CONTEXT" ]; then
          echo "❌ No current context found"
          kubectl config get-contexts 2>/dev/null || echo "No contexts available"
          exit 1
        fi
        echo "✅ Current context: $CURRENT_CONTEXT"
        
        if ! kubectl cluster-info &> /dev/null; then
          echo "❌ Cannot connect to cluster"
          exit 1
        fi
        echo "✅ Connected to cluster successfully"
        
        # Build Helm command
        HELM_CMD="helm upgrade --install ${{ env.NAMESPACE }} ./nod-web \
            --namespace ${{ env.NAMESPACE }} \
            --values $VALUES_FILE \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.tag=$SHORT_SHA"
        
        echo "🔧 Final Helm command:"
        echo "$HELM_CMD"
        
        # Validate chart before deployment
        echo "🔍 Validating chart..."
        helm lint ./nod-web || {
          echo "❌ Chart validation failed"
          exit 1
        }
        
        echo "Executing: $HELM_CMD"
        
        # Show namespace status before deployment
        echo "📁 Checking namespace status before deployment..."
        kubectl get namespace nod-web-prod --ignore-not-found=true || echo "Namespace does not exist yet"
        
        # Execute Helm command
        echo "🔧 Executing Helm command..."
        eval $HELM_CMD
        HELM_EXIT_CODE=$?
        
        # If Helm fails, show more debugging info
        if [ $HELM_EXIT_CODE -ne 0 ]; then
          echo "🔍 Helm deployment failed. Checking for issues..."
          echo "📋 Checking namespace resources:"
          kubectl get all -n nod-web-prod || echo "No resources found"
          echo "📋 Checking events:"
          kubectl get events -n nod-web-prod --sort-by='.lastTimestamp' || echo "No events found"
          echo "📋 Checking pod logs:"
          kubectl logs -n nod-web-prod -l app.kubernetes.io/name=nod-web --tail=50 || echo "No logs found"
          echo "📋 Checking pod status:"
          kubectl get pods -n nod-web-prod -o wide || echo "No pods found"
          echo "📋 Checking deployment status:"
          kubectl describe deployment -n nod-web-prod $(kubectl get deployment -n nod-web-prod -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || echo "No deployment found"
          exit 1
        fi
        
        echo "✅ Deployment successful!"
        echo "📊 Check status with:"
        echo "  kubectl get pods -n nod-web-prod"
        echo "  kubectl get svc -n nod-web-prod"
        echo "  helm list -n nod-web-prod"
        
        # Show service URL if available
        SERVICE_URL=$(kubectl get svc -n nod-web-prod -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null)
        if [ ! -z "$SERVICE_URL" ]; then
          echo "🌐 Service URL: http://$SERVICE_URL"
        fi
        
        # Show deployment info
        echo "📋 Deployment Info:"
        echo "  Image tag: $SHORT_SHA"
        echo "  Environment: prod"
        echo "  Release: nod-web-prod"

    - name: Verify deployment
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/nod-web-prod -n nod-web-prod

    - name: Notify deployment
      if: success()
      run: |
        echo "🚀 Production deployment completed successfully!"
        echo "Version: ${{ github.sha }}"
        echo "Environment: Production"